<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Criar novo sócio</title>
  <desc id="desc">Esquema do formulário de criação de novo sócio.</desc>
  <rect width="980" height="560" fill="#f4f8fb"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#071b4d">Criar ou editar sócio</text>
  <text x="60" y="102" font-family="Arial, sans-serif" font-size="17" fill="#526678">Preencher a ficha e carregar em Guardar.</text>

  <rect x="250" y="54" width="500" height="452" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="286" y="104" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#071b4d">Novo sócio</text>
  <text x="286" y="130" font-family="Arial, sans-serif" font-size="15" fill="#526678">Ficha individual</text>

  <text x="286" y="174" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#385466">Nº de sócio</text>
  <rect x="286" y="186" width="190" height="38" rx="8" fill="#ffffff" stroke="#0ab47d"/>
  <text x="498" y="174" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#385466">Data de adesão</text>
  <rect x="498" y="186" width="190" height="38" rx="8" fill="#ffffff" stroke="#b8cbd2"/>

  <text x="286" y="256" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#385466">Quotas pagas até</text>
  <rect x="286" y="268" width="190" height="38" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="498" y="256" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#385466">Nome</text>
  <rect x="498" y="268" width="190" height="38" rx="8" fill="#ffffff" stroke="#0ab47d"/>

  <text x="286" y="338" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#385466">NIF</text>
  <rect x="286" y="350" width="190" height="38" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="498" y="338" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#385466">Telemóvel</text>
  <rect x="498" y="350" width="190" height="38" rx="8" fill="#ffffff" stroke="#b8cbd2"/>

  <rect x="286" y="430" width="124" height="44" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="348" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#071b4d">Cancelar</text>
  <rect x="520" y="430" width="168" height="44" rx="8" fill="#0ab47d"/>
  <text x="604" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Guardar</text>

  <circle cx="190" cy="202" r="16" fill="#0ab47d"/>
  <text x="190" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
  <text x="60" y="236" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#071b4d">Obrigatórios</text>
  <text x="60" y="260" font-family="Arial, sans-serif" font-size="14" fill="#526678">Nº de sócio e nome.</text>

  <circle cx="190" cy="300" r="16" fill="#0ab47d"/>
  <text x="190" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">2</text>
  <text x="60" y="334" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#071b4d">Quotas</text>
  <text x="60" y="358" font-family="Arial, sans-serif" font-size="14" fill="#526678">Escolher a data no calendário.</text>

  <circle cx="792" cy="452" r="16" fill="#0ab47d"/>
  <text x="792" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">3</text>
  <text x="816" y="446" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#071b4d">Guardar</text>
  <text x="816" y="470" font-family="Arial, sans-serif" font-size="14" fill="#526678">A ficha fica na lista.</text>
</svg>
