<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Ecrã de login</title>
  <desc id="desc">Esquema simples do ecrã de entrada no website.</desc>
  <rect width="980" height="560" fill="#f4f8fb"/>
  <rect x="44" y="44" width="892" height="472" rx="8" fill="#ffffff" stroke="#d8e5ea"/>
  <text x="78" y="96" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#071b4d">1. Entrar no website</text>
  <text x="78" y="128" font-family="Arial, sans-serif" font-size="17" fill="#526678">Abrir o link, escrever email/password e carregar em Entrar.</text>

  <rect x="334" y="96" width="312" height="368" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <circle cx="490" cy="154" r="42" fill="#e3f8f0" stroke="#0ab47d" stroke-width="4"/>
  <path d="M490 124v60M466 154h48" stroke="#071b4d" stroke-width="8" stroke-linecap="round"/>
  <text x="392" y="222" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#071b4d">Gestão de Sócios</text>
  <text x="390" y="252" font-family="Arial, sans-serif" font-size="15" fill="#526678">Acesso reservado a utilizadores autorizados.</text>

  <text x="376" y="292" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#385466">Email</text>
  <rect x="376" y="304" width="228" height="40" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="392" y="330" font-family="Arial, sans-serif" font-size="14" fill="#9fb2c6">nome@email.pt</text>

  <text x="376" y="372" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#385466">Password</text>
  <rect x="376" y="384" width="228" height="40" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="392" y="410" font-family="Arial, sans-serif" font-size="18" fill="#071b4d">••••••••</text>

  <rect x="376" y="440" width="228" height="44" rx="8" fill="#0ab47d"/>
  <text x="464" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Entrar</text>

  <circle cx="692" cy="308" r="16" fill="#0ab47d"/>
  <text x="692" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
  <text x="720" y="302" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#071b4d">Email autorizado</text>
  <text x="720" y="326" font-family="Arial, sans-serif" font-size="14" fill="#526678">Usar o email criado pelo administrador.</text>

  <circle cx="692" cy="390" r="16" fill="#0ab47d"/>
  <text x="692" y="396" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">2</text>
  <text x="720" y="384" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#071b4d">Password</text>
  <text x="720" y="408" font-family="Arial, sans-serif" font-size="14" fill="#526678">Não partilhar com outras pessoas.</text>

  <circle cx="692" cy="462" r="16" fill="#0ab47d"/>
  <text x="692" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">3</text>
  <text x="720" y="456" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#071b4d">Entrar</text>
  <text x="720" y="480" font-family="Arial, sans-serif" font-size="14" fill="#526678">Depois aparece o painel principal.</text>
</svg>
