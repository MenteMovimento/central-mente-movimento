<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Menu e gestor de administradores</title>
  <desc id="desc">Esquema do menu de ferramentas e da gestão de administradores.</desc>
  <rect width="980" height="560" fill="#f4f8fb"/>
  <rect x="48" y="50" width="884" height="460" rx="8" fill="#ffffff" stroke="#d8e5ea"/>
  <text x="82" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#071b4d">Menu e administradores</text>
  <text x="82" y="132" font-family="Arial, sans-serif" font-size="17" fill="#526678">As opções mais sensíveis ficam separadas.</text>

  <rect x="108" y="178" width="254" height="284" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="136" y="218" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#071b4d">Menu ☰</text>
  <line x1="108" y1="238" x2="362" y2="238" stroke="#d8e5ea"/>
  <text x="136" y="276" font-family="Arial, sans-serif" font-size="17" fill="#071b4d">Importar</text>
  <text x="136" y="318" font-family="Arial, sans-serif" font-size="17" fill="#071b4d">Exportar Excel</text>
  <text x="136" y="360" font-family="Arial, sans-serif" font-size="17" fill="#071b4d">Tema claro/escuro</text>
  <text x="136" y="402" font-family="Arial, sans-serif" font-size="17" fill="#071b4d">Histórico de alterações</text>
  <text x="136" y="444" font-family="Arial, sans-serif" font-size="17" fill="#071b4d">Idioma</text>

  <rect x="452" y="178" width="392" height="284" rx="8" fill="#f8fbfa" stroke="#b8cbd2"/>
  <text x="482" y="218" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#071b4d">Gestor de Administradores</text>
  <text x="482" y="248" font-family="Arial, sans-serif" font-size="15" fill="#526678">Só aparece para administradores.</text>
  <rect x="482" y="282" width="142" height="38" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="500" y="306" font-family="Arial, sans-serif" font-size="14" fill="#526678">Nome</text>
  <rect x="640" y="282" width="172" height="38" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="658" y="306" font-family="Arial, sans-serif" font-size="14" fill="#526678">Email</text>
  <rect x="482" y="342" width="142" height="38" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="500" y="366" font-family="Arial, sans-serif" font-size="14" fill="#526678">Password</text>
  <rect x="640" y="342" width="172" height="38" rx="8" fill="#ffffff" stroke="#b8cbd2"/>
  <text x="658" y="366" font-family="Arial, sans-serif" font-size="14" fill="#526678">Perfil</text>
  <rect x="482" y="404" width="178" height="42" rx="8" fill="#0ab47d"/>
  <text x="571" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Criar utilizador</text>

  <circle cx="316" cy="178" r="16" fill="#0ab47d"/>
  <text x="316" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
  <text x="84" y="500" font-family="Arial, sans-serif" font-size="15" fill="#526678">Menu: importar, exportar, histórico, tema e idioma.</text>

  <circle cx="820" cy="178" r="16" fill="#0ab47d"/>
  <text x="820" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">2</text>
  <text x="452" y="500" font-family="Arial, sans-serif" font-size="15" fill="#526678">Administradores: criar contas, editar perfis e retirar acessos.</text>
</svg>
