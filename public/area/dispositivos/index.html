<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/area/dispositivos/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de dispositivos | Mentemovimento</title>
    <script>
      (() => {
        document.documentElement.dataset.centralAuthPending = "true";
        const renderLoading = () => {
          if (document.getElementById("centralAuthLoading")) return;
          const node = document.createElement("div");
          node.id = "centralAuthLoading";
          node.setAttribute("role", "status");
          node.setAttribute("aria-live", "polite");
          node.textContent = "A validar sessão...";
          document.body.prepend(node);
        };
        if (document.body) {
          renderLoading();
        } else {
          document.addEventListener("DOMContentLoaded", renderLoading, { once: true });
        }
      })();
    </script>
    <style>
      html[data-central-auth-pending="true"] {
        min-height: 100%;
        background: #f4fbf8;
      }

      html[data-theme="dark"][data-central-auth-pending="true"] {
        background: #07131f;
      }

      #centralAuthLoading {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background: #f4fbf8;
        color: #05285a;
        font: 700 22px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      html[data-theme="dark"] #centralAuthLoading {
        background: #07131f;
        color: #dff7f0;
      }
    </style>
    <script src="/static/vendor/supabase.js" defer></script>
    <script src="/static/central-config.js?v=20260605-socios-login-logo" defer></script>
    <script src="/static/central-module-auth.js?v=20260605-socios-login-logo" defer></script>
    <script type="module" crossorigin src="/area/dispositivos/assets/index-CwtWBX3S.js"></script>
    <link rel="stylesheet" crossorigin href="/area/dispositivos/assets/index-BDONd1ZN.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
